spring.application.name=jobmatch

# ===============================
# = DATA SOURCE
# ===============================
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:jobassistant}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# = JPA / HIBERNATE
# ===============================
# create | create-drop | update | validate | none

spring.jpa.open-in-view=false
server.tomcat.threads.max=10

# Show SQL queries in console (useful while devving)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use Spring’s snake_case naming (camelCase -> snake_case)
# Use Hibernate 6 built-in snake_case naming
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# ===============================
# = SERVER
# ===============================
server.port=8080

# ===============================
# = RESUME
# ===============================
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ===============================
# = JWT
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.expMinutes=60

# ===============================
# = OPENAPI / SWAGGER UI
# ===============================
# Server entries shown in the Swagger "Try it out" dropdown. Local stays the
# default for dev; production is sourced from OPENAPI_PROD_URL (the Railway backend).
app.openapi.local-url=http://localhost:8080
app.openapi.prod-url=${OPENAPI_PROD_URL:https://job-match.up.railway.app}
# Swagger UI served at /swagger-ui.html; OpenAPI JSON at /v3/api-docs.
springdoc.swagger-ui.path=/swagger-ui.html
# Operations sorted alphabetically within each group. Tag (group) order is left to
# the declared order in OpenApiConfig so the public groups (Analysis, Auth) lead.
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
# Keep Spring Boot actuator/health out of the API docs group.
springdoc.show-actuator=false
# Production exposure: Swagger UI stays ENABLED on Railway because the whole point
# of this portfolio project is that recruiters can click through the live API.
# Tradeoff: it exposes the full API surface, which is acceptable here because
# protected endpoints still require a valid JWT and no secrets are documented.
# To gate it later, the clean approach is a Spring profile toggle on
# springdoc.api-docs.enabled / springdoc.swagger-ui.enabled (not done now).

# --- Flyway ---
spring.flyway.enabled=true
# Schema already exists; create baseline entry so migrations start at V2
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# spring.flyway.schemas=public
# Optional: keep Hibernate from racing schema changes (recommended with Flyway)
spring.jpa.hibernate.ddl-auto=none

logging.level.org.flywaydb=debug
logging.level.org.hibernate.SQL=debug
